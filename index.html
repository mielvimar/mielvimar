<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MIELVIMAR Argentina | Venta de Miel</title>
<style>
  :root {
    --primary: #f4c430;
    --secondary: #d4a017;
    --dark: #333;
    --light: #f9f9f9;
    --white: #fff;
    --shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  * {
    margin:0; padding:0; box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  body {
    background: var(--light);
    color: var(--dark);
  }
  a {
    text-decoration:none;
    color:inherit;
    cursor: pointer;
  }
  header {
    background-color: var(--white);
    box-shadow: var(--shadow);
    position: sticky;
    top: 0;
    z-index: 1000;
  }
  nav {
    max-width: 1200px;
    margin: auto;
    padding: 1rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-weight: 900;
    font-size: 1.7rem;
    color: var(--primary);
    user-select:none;
  }
  .logo span {
    color: var(--dark);
    font-weight: 700;
  }
  .nav-right {
    display: flex;
    align-items: center;
    gap: 20px;
    font-weight: 600;
    font-size: 0.95rem;
    user-select:none;
  }
  .tab {
    padding: 8px 15px;
    cursor: pointer;
    border-radius: 5px;
    background-color: #f0e84a70;
    color: var(--dark);
    border: 1.8px solid transparent;
    transition: background-color 0.3s, border-color 0.3s;
    user-select:none;
  }
  .tab:hover {
    background-color: #f0e84a;
  }
  .tab.active {
    background-color: var(--primary);
    color: var(--dark);
    border-color: var(--dark);
    font-weight: 700;
  }
  .btn-contacto, .btn-pagos {
    padding: 8px 15px;
    border-radius: 5px;
    background-color: var(--dark);
    color: var(--white);
    cursor: pointer;
    border: none;
    font-weight: 600;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background-color 0.3s;
    user-select:none;
  }
  .btn-contacto:hover, .btn-pagos:hover {
    background-color: #222;
  }
  #product-section {
    max-width: 1200px;
    margin: 1rem auto 1rem auto;
    padding: 0 1rem;
    background: var(--white);
    border-radius: 10px;
    box-shadow: var(--shadow);
    min-height: 300px;
  }
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(240px,1fr));
    gap: 1.5rem;
    margin-top: 1rem;
  }
  .product-card {
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fff;
    padding: 15px;
    box-shadow: 0 0 8px #ccc;
    transition: box-shadow 0.3s;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
  }
  .product-card:hover {
    box-shadow: 0 0 16px #aaa;
  }
  .product-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 12px;
    pointer-events: none;
  }
  .product-title {
    font-weight: 700;
    font-size: 1.2rem;
    margin-bottom: 0.4rem;
    text-align: center;
  }
  .product-price {
    font-weight: 800;
    color: var(--primary);
    font-size: 1.4rem;
    margin-bottom: 0.8rem;
  }
  .btn-add {
    width: 100%;
    padding: 9px;
    border: none;
    border-radius: 5px;
    background-color: var(--dark);
    color: white;
    cursor: pointer;
    font-weight: 700;
    font-size: 1rem;
    transition: background-color 0.3s;
    user-select:none;
    pointer-events: auto;
  }
  .btn-add:hover {
    background-color: var(--primary);
    color: var(--dark);
  }
  /* Modal detalle producto */
  .modal-detalle {
    display:none; 
    position: fixed;
    z-index: 10000;
    left: 0; top: 0; width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .modal-detalle-content {
    background: var(--white);
    max-width: 800px;
    width: 100%;
    border-radius: 10px;
    display: flex;
    gap: 20px;
    padding: 20px;
    box-shadow: var(--shadow);
    color: var(--dark);
    position: relative;
    flex-wrap: wrap;
  }
  .modal-detalle-close {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 2rem;
    font-weight: bold;
    color: var(--dark);
    cursor: pointer;
  }
  .detalle-img {
    flex: 1 1 300px;
    max-width: 300px;
    border-radius: 10px;
    object-fit: cover;
    max-height: 300px;
    width: 100%;
  }
  .detalle-texto {
    flex: 2 1 400px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    font-size: 1.1rem;
    line-height: 1.4;
  }
  .detalle-texto strong {
    font-weight: 900;
    margin-top: 10px;
    color: var(--primary);
  }
  /* Modal carrito */
  .modal {
    display:none; 
    position: fixed;
    z-index: 9999;
    padding-top: 100px;
    left: 0; top: 0; width: 100%; height: 100%;
    overflow: auto;
    background-color: rgba(0,0,0,0.5);
  }
  .modal-content {
    background-color: var(--white);
    margin: auto;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    max-width: 400px;
  }
  .cart-header {
    display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;
  }
  .close {
    color: var(--dark);
    cursor: pointer;
    font-size: 26px;
    font-weight: 700;
  }
  .payment-option {
    padding: 12px;
    border-radius: 6px;
    background: #f7f7f7;
    margin: 10px 0;
    font-size: 1rem;
    box-shadow: inset 1px 1px 3px #ddd;
  }
  .payment-option strong.abono {
    display: block;
    font-weight: 900;
    margin-bottom: 15px;
  }
  .cart-icon {
    position: relative;
    cursor: pointer;
    font-size: 1.2rem;
    user-select:none;
  }
  .cart-count {
    position: absolute;
    top: -8px;
    right: -10px;
    background-color: red;
    color: white;
    font-size: 0.7rem;
    padding: 2px 6px;
    border-radius: 50%;
  }
  .btn-checkout {
    width: 100%;
    background-color: #25D366;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 5px;
    margin-top: 1rem;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 700;
    user-select:none;
    display:none;
  }
